<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Approval probability — molecule + disease</title>
<style>
  :root { color-scheme: light dark; --fg:#1a1a1a; --muted:#666; --bg:#fafafa;
          --card:#fff; --border:#e2e2e2; --accent:#2f6fed; }
  @media (prefers-color-scheme: dark) {
    :root { --fg:#e8e8e8; --muted:#9aa; --bg:#15171a; --card:#1e2127; --border:#2c3038; }
  }
  * { box-sizing: border-box; }
  body { font: 15px/1.5 system-ui, -apple-system, sans-serif; color: var(--fg);
         background: var(--bg); margin: 0; padding: 2rem 1rem; }
  main { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
  p.sub { color: var(--muted); margin: 0 0 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
          padding: 1.25rem; margin-bottom: 1rem; }
  label { display: block; font-weight: 600; margin-bottom: .35rem; }
  .hint { font-weight: 400; color: var(--muted); font-size: .85em; }
  input { width: 100%; padding: .6rem .7rem; font-size: 1rem; border: 1px solid var(--border);
          border-radius: 8px; background: var(--bg); color: var(--fg); margin-bottom: 1rem; }
  button { width: 100%; padding: .7rem; font-size: 1rem; font-weight: 600; color: #fff;
           background: var(--accent); border: 0; border-radius: 8px; cursor: pointer; }
  button:disabled { opacity: .6; cursor: default; }
  #result { display: none; }
  .prob { font-size: 3rem; font-weight: 700; line-height: 1; }
  .bar { height: 10px; border-radius: 6px; background: var(--border); overflow: hidden;
         margin: .75rem 0; }
  .bar > div { height: 100%; background: var(--accent); width: 0; transition: width .4s; }
  .ctx { color: var(--muted); font-size: .9rem; }
  .diag { font-size: .85rem; color: var(--muted); margin-top: .75rem; }
  .diag .warn { color: #c2410c; }
  .diag .match { color: #15803d; }
  .err { color: #c2410c; }
  .row { display: flex; gap: .5rem; margin-bottom: .5rem; }
  .row input { margin-bottom: 0; }
  button.lookup { width: auto; flex: 0 0 auto; padding: .6rem 1rem; background: transparent;
                  color: var(--accent); border: 1px solid var(--accent); font-weight: 600; }
  .lookmsg { font-size: .85rem; color: var(--muted); margin-bottom: 1rem; min-height: 1.1em; }
  .lookmsg .warn { color: #c2410c; }
  #icdcands { margin: -.5rem 0 1rem; }
  #icdcands label { font-weight: 400; display: flex; gap: .5rem; align-items: baseline;
                    padding: .25rem 0; cursor: pointer; }
  #icdcands input { width: auto; margin: 0; }
  #icdcands code { color: var(--accent); font-weight: 600; }
  #cohort { display: none; }
  .cohort-h { font-size: .8rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
              color: var(--muted); margin: 0 0 1rem; }
  .stat { padding: .9rem 0; border-top: 1px solid var(--border); }
  .stat:first-of-type { border-top: 0; padding-top: 0; }
  .stat.off { opacity: .55; }
  .stat-frac { font-size: 1.5rem; font-weight: 700; line-height: 1; }
  .stat-frac .of { color: var(--muted); font-weight: 400; font-size: 1rem; }
  .stat-line { margin: .15rem 0 0; }
  .stat-sub { font-size: .82rem; color: var(--muted); margin-top: .4rem; }
  .dots { display: flex; flex-wrap: wrap; gap: 5px; margin-top: .6rem; }
  .dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid var(--accent);
         box-sizing: border-box; }
  .dot.on { background: var(--accent); }
  .stat .bar { margin: .6rem 0 .3rem; position: relative; }
  .stat .bar > div { background: var(--accent); }
  .basemark { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--muted);
              opacity: .7; }
  details.neigh { margin-top: .5rem; }
  details.neigh summary { font-size: .82rem; color: var(--accent); cursor: pointer; }
  .neigh table { width: 100%; border-collapse: collapse; font-size: .82rem; margin-top: .5rem; }
  .neigh td { padding: .2rem 0; color: var(--fg); }
  .neigh td.sim { color: var(--muted); text-align: right; width: 4rem; }
  .neigh td.out { width: 1.5rem; text-align: right; }
  .neigh .yes { color: #15803d; } .neigh .no { color: var(--muted); }
</style>
</head>
<body>
<main>
  <h1>Drug approval probability</h1>
  <p class="sub">Molecule + disease model — enter a structure and indication.</p>

  <div class="card">
    <label for="drugname">Drug name <span class="hint">look up structure via ChEMBL</span></label>
    <div class="row">
      <input id="drugname" placeholder="aspirin" autocomplete="off" />
      <button class="lookup" id="lookdrug">Look up</button>
    </div>
    <div class="lookmsg" id="drugmsg"></div>

    <label for="diseasename">Disease name <span class="hint">find ICD-10 codes via NLM</span></label>
    <div class="row">
      <input id="diseasename" placeholder="alzheimer" autocomplete="off" />
      <button class="lookup" id="lookdisease">Look up</button>
    </div>
    <div class="lookmsg" id="diseasemsg"></div>
    <div id="icdcands"></div>
  </div>

  <div class="card">
    <label for="smiles">SMILES</label>
    <input id="smiles" placeholder="CC(=O)Oc1ccccc1C(=O)O" autocomplete="off" />

    <label for="icd">ICD-10 code <span class="hint">e.g. C50.9</span></label>
    <input id="icd" placeholder="C50.9" autocomplete="off" />

    <button id="go">Predict</button>
  </div>

  <div class="card" id="result">
    <div class="prob"><span id="prob">–</span></div>
    <div class="bar"><div id="probbar"></div></div>
    <div class="ctx" id="ctx"></div>
    <div class="diag" id="diag"></div>
  </div>

  <div class="card" id="cohort">
    <p class="cohort-h">Comparable programs in our dataset</p>

    <div class="stat" id="stat-mol">
      <div class="stat-frac"><span id="mol-x">–</span><span class="of"> of <span id="mol-n">–</span></span></div>
      <div class="stat-line" id="mol-line"></div>
      <div class="dots" id="mol-dots"></div>
      <div class="stat-sub" id="mol-sub"></div>
      <details class="neigh" id="mol-detw"><summary>show neighbors</summary><div id="mol-det"></div></details>
    </div>

    <div class="stat" id="stat-dis">
      <div class="stat-frac"><span id="dis-x">–</span><span class="of"> of <span id="dis-n">–</span></span></div>
      <div class="stat-line" id="dis-line"></div>
      <div class="bar"><div id="dis-bar"></div><div class="basemark" id="dis-base"></div></div>
      <div class="stat-sub" id="dis-sub"></div>
    </div>

    <div class="stat" id="stat-both">
      <div class="stat-frac"><span id="both-x">–</span><span class="of"> of <span id="both-n">–</span></span></div>
      <div class="stat-line" id="both-line"></div>
      <div class="dots" id="both-dots"></div>
      <div class="stat-sub" id="both-sub"></div>
    </div>
  </div>

  <p class="err" id="err"></p>
</main>

<script>
const $ = (id) => document.getElementById(id);

function postJSON(url, body) {
  return fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  }).then(async (r) => {
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    return r.json();
  });
}

async function predict() {
  const smiles = $("smiles").value.trim();
  // one ICD code at a time — take the first if anything extra was typed
  const icd_codes = $("icd").value.split(",").map(s => s.trim()).filter(Boolean).slice(0, 1);
  $("err").textContent = "";
  $("go").disabled = true; $("go").textContent = "Scoring…";
  // Score and pull the dataset cohort concurrently — independent calls.
  const cohort = postJSON("/cohort", { smiles, icd_codes })
    .then(renderCohort)
    .catch(() => { $("cohort").style.display = "none"; });
  try {
    render(await postJSON("/predict", { smiles, icd_codes }));
  } catch (e) {
    $("err").textContent = "Error: " + e.message;
  } finally {
    await cohort;
    $("go").disabled = false; $("go").textContent = "Predict";
  }
}

function dotStrip(el, n, on) {
  el.innerHTML = Array.from({ length: n }, (_, i) =>
    `<span class="dot${i < on ? " on" : ""}"></span>`).join("");
}

function neighborTable(rows) {
  return '<table>' + rows.map(r =>
    `<tr><td>${r.drug_name}</td><td class="sim">${(r.similarity * 100).toFixed(0)}%</td>` +
    `<td class="out ${r.approved ? "yes" : "no"}">${r.approved ? "✓" : "·"}</td></tr>`
  ).join("") + '</table>';
}

function renderCohort(d) {
  const pct = (x) => (x * 100).toFixed(0) + "%";

  // Card 1 — molecular neighbors
  const m = d.molecular;
  const sm = $("stat-mol");
  if (m.available && m.n > 0) {
    sm.classList.remove("off");
    $("mol-x").textContent = m.n_approved; $("mol-n").textContent = m.n;
    $("mol-line").textContent =
      `drugs similar to this molecule (Tanimoto ≥ ${d.threshold}) reached final approval`;
    dotStrip($("mol-dots"), m.n, m.n_approved);
    $("mol-sub").textContent = `${pct(m.n_approved / m.n)} of this molecule's nearest neighbors`;
    $("mol-det").innerHTML = neighborTable(m.neighbors);
    $("mol-detw").style.display = "";
  } else {
    sm.classList.add("off");
    $("mol-x").textContent = "0"; $("mol-n").textContent = "0";
    $("mol-line").textContent = m.available
      ? `no dataset drugs above Tanimoto ${d.threshold} — this is a novel structure`
      : "enter a valid SMILES to compare similar drugs";
    $("mol-dots").innerHTML = ""; $("mol-sub").textContent = ""; $("mol-detw").style.display = "none";
  }

  // Card 2 — disease area
  const dis = d.disease;
  const sd = $("stat-dis");
  if (dis.available && dis.n > 0) {
    sd.classList.remove("off");
    $("dis-x").textContent = dis.n_approved; $("dis-n").textContent = dis.n;
    $("dis-line").textContent = "programs targeting this disease area reached final approval";
    $("dis-bar").style.width = pct(dis.rate);
    $("dis-base").style.left = pct(dis.base_rate);
    $("dis-sub").innerHTML =
      `${pct(dis.rate)} approved &nbsp;·&nbsp; dataset average ${pct(dis.base_rate)} (marker)`;
  } else {
    sd.classList.add("off");
    $("dis-x").textContent = "0"; $("dis-n").textContent = "0";
    $("dis-line").textContent = dis.available
      ? "no programs in this disease area in our dataset"
      : "enter an ICD-10 code to compare this disease area";
    $("dis-bar").style.width = "0"; $("dis-base").style.left = "-10px"; $("dis-sub").textContent = "";
  }

  // Card 3 — similar drugs × this disease
  const b = d.both;
  const sb = $("stat-both");
  if (b.available && b.n > 0) {
    sb.classList.remove("off");
    $("both-x").textContent = b.n_approved; $("both-n").textContent = b.n;
    $("both-line").textContent = "similar drugs tested on this disease were approved";
    dotStrip($("both-dots"), b.n, b.n_approved);
    $("both-sub").innerHTML = b.drugs.length
      ? "incl. " + b.drugs.slice(0, 4).map(x => x.drug_name).join(", ")
      : "";
  } else {
    sb.classList.add("off");
    $("both-x").textContent = "0"; $("both-n").textContent = "0";
    $("both-line").textContent = b.available
      ? "no similar drugs were tested on this disease in our dataset"
      : "needs both a valid SMILES and an ICD-10 code";
    $("both-dots").innerHTML = ""; $("both-sub").textContent = "";
  }

  $("cohort").style.display = "block";
}

function render(d) {
  const pct = (d.approval_probability * 100).toFixed(1);
  $("prob").textContent = pct + "%";
  $("probbar").style.width = pct + "%";

  let ctx = "predicted probability of eventual approval";
  if (d.base_rate != null) {
    const base = (d.base_rate * 100).toFixed(0);
    const rel = d.approval_probability >= d.base_rate ? "above" : "below";
    ctx += ` — ${rel} the ~${base}% base rate`;
  }
  $("ctx").textContent = ctx;

  const diag = [];
  if (d.already_approved) {
    diag.push(`<span class="match">✓ exact match — ${d.matched_drug_name} already approved for this disease area in our dataset</span>`);
  }
  if (!d.smiles_valid) diag.push('<span class="warn">⚠ SMILES did not parse — molecule features are blank</span>');
  if (d.n_icd_total === 0) diag.push('<span class="warn">⚠ no ICD codes entered</span>');
  else diag.push(`${d.n_icd_in_vocab}/${d.n_icd_total} ICD code(s) recognized by the model`);
  if (d.raw_score != null) diag.push(`calibrated (raw model score ${(d.raw_score * 100).toFixed(0)}%)`);
  if (d.model && d.model.roc_auc != null) {
    let m = `model test ROC-AUC ${d.model.roc_auc.toFixed(3)}`;
    if (d.model.brier != null) m += `, Brier ${d.model.brier.toFixed(3)}`;
    diag.push(m);
  }
  $("diag").innerHTML = diag.join(" · ");

  $("result").style.display = "block";
}

async function lookupDrug() {
  const name = $("drugname").value.trim();
  if (!name) return;
  $("drugmsg").textContent = "Looking up…";
  $("lookdrug").disabled = true;
  try {
    const r = await fetch("/resolve/drug?name=" + encodeURIComponent(name));
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    const d = await r.json();
    if (d.smiles) {
      $("smiles").value = d.smiles;
      $("drugmsg").innerHTML = `matched <b>${d.pref_name || d.chembl_id}</b> → SMILES filled`;
    } else if (!d.candidates || !d.candidates.length) {
      $("drugmsg").innerHTML = '<span class="warn">no ChEMBL match — check the spelling, or paste a SMILES string into the field below.</span>';
    } else {
      const top = d.candidates[0];
      const label = top.pref_name || top.chembl_id || "this entry";
      $("drugmsg").innerHTML = `<span class="warn">matched <b>${label}</b>, but it has no small-molecule structure (likely a biologic, e.g. an antibody or protein). Paste a SMILES string into the field below if you have one.</span>`;
    }
  } catch (e) {
    $("drugmsg").innerHTML = '<span class="warn">Error: ' + e.message + '</span>';
  } finally {
    $("lookdrug").disabled = false;
  }
}

function syncIcdField() {
  const picked = document.querySelector("#icdcands input:checked");
  $("icd").value = picked ? picked.value : "";
}

async function lookupDisease() {
  const name = $("diseasename").value.trim();
  if (!name) return;
  $("diseasemsg").textContent = "Looking up…";
  $("icdcands").innerHTML = "";
  $("lookdisease").disabled = true;
  try {
    const r = await fetch("/resolve/disease?name=" + encodeURIComponent(name));
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    const d = await r.json();
    if (!d.candidates.length) {
      $("diseasemsg").innerHTML = '<span class="warn">no ICD matches — try different wording or enter codes below</span>';
      return;
    }
    $("diseasemsg").textContent = "select one code:";
    $("icdcands").innerHTML = d.candidates.map(c =>
      `<label><input type="radio" name="icdcand" value="${c.code}"><code>${c.code}</code> ${c.name}</label>`
    ).join("");
    document.querySelectorAll("#icdcands input").forEach(c => c.addEventListener("change", syncIcdField));
  } catch (e) {
    $("diseasemsg").innerHTML = '<span class="warn">Error: ' + e.message + '</span>';
  } finally {
    $("lookdisease").disabled = false;
  }
}

$("go").addEventListener("click", predict);
$("lookdrug").addEventListener("click", lookupDrug);
$("lookdisease").addEventListener("click", lookupDisease);
$("drugname").addEventListener("keydown", (e) => { if (e.key === "Enter") lookupDrug(); });
$("diseasename").addEventListener("keydown", (e) => { if (e.key === "Enter") lookupDisease(); });
for (const id of ["smiles", "icd"]) {
  $(id).addEventListener("keydown", (e) => { if (e.key === "Enter") predict(); });
}
</script>
</body>
</html>
